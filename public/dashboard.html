<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MSAJCE Bot Terminal | Administrative Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #ffffff;
            --text-main: #111111;
            --text-muted: #666666;
            --border: #eeeeee;
            --accent: #000000;
            --success: #10b981;
            --error: #ef4444;
            --surface: #fafafa;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
            overflow: hidden;
        }

        header {
            height: 64px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 40px;
            justify-content: space-between;
        }

        .logo {
            font-weight: 700;
            font-size: 14px;
            letter-spacing: -0.01em;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .bot-toggle {
            display: flex;
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 2px;
            border-radius: 8px;
        }

        .bot-toggle button {
            padding: 8px 16px;
            border: none;
            background: none;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-muted);
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.2s;
        }

        .bot-toggle button.active {
            background: var(--bg);
            color: var(--text-main);
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }

        main {
            display: grid;
            grid-template-columns: 320px 1fr;
            height: calc(100vh - 64px);
        }

        aside {
            border-right: 1px solid var(--border);
            padding: 40px;
            display: flex;
            flex-direction: column;
            gap: 32px;
        }

        .metric-card {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .metric-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            font-weight: 600;
        }

        .metric-value {
            font-size: 24px;
            font-weight: 500;
            letter-spacing: -0.02em;
        }

        .content {
            padding: 40px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .section-title {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-muted);
            font-weight: 700;
            margin-bottom: 8px;
        }

        .log-container {
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            line-height: 1.6;
        }

        .log-entry {
            padding: 12px 0;
            border-bottom: 1px solid var(--border);
            display: flex;
            gap: 20px;
        }

        .log-time {
            color: var(--text-muted);
            min-width: 80px;
            flex-shrink: 0;
        }

        .log-msg {
            color: var(--text-main);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
        }

        .status-online { background: var(--success); }

        .loading-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 500;
            z-index: 100;
        }

        @media (max-width: 900px) {
            main { grid-template-columns: 1fr; }
            aside { display: none; }
        }
    </style>
</head>
<body>
    <div id="loader" class="loading-overlay">Initializing System...</div>

    <header>
        <div class="logo">
            <span class="status-dot status-online"></span>
            MSAJCE BOT OPERATIONS
        </div>
        <div class="bot-toggle" id="botToggle">
            <button class="active" onclick="switchBot('assistant')">Academic Assistant</button>
            <button onclick="switchBot('grievance')">Grievance Portal</button>
        </div>
        <div style="font-size: 12px; color: var(--text-muted); font-weight: 500;" id="lastSync">SYNCED JUST NOW</div>
    </header>

    <main>
        <aside>
            <div class="metric-card">
                <span class="metric-label">Total Volume</span>
                <span class="metric-value" id="mTotal">0</span>
            </div>
            <div class="metric-card">
                <span class="metric-label">Avg P95 Latency</span>
                <span class="metric-value" id="mLatency">0ms</span>
            </div>
            <div class="metric-card">
                <span class="metric-label">Integration Uptime</span>
                <span class="metric-value">99.9%</span>
            </div>
        </aside>

        <section class="content">
            <div style="flex: 1;">
                <h3 class="section-title">Operational Logs</h3>
                <div class="log-container" id="logContainer">
                    <div class="log-entry"><span class="log-msg">Tail streaming initialized...</span></div>
                </div>
            </div>
        </section>
    </main>

    <script>
        let currentBot = 'assistant';
        let allData = { logs: [], metrics: { assistant: {}, grievance: {} } };

        async function fetchData() {
            try {
                const res = await fetch('/api/monitor');
                allData = await res.json();
                render();
                document.getElementById('loader').style.display = 'none';
                document.getElementById('lastSync').innerText = 'SYNCED ' + new Date().toLocaleTimeString();
            } catch (e) {
                console.error("Fetch error", e);
            }
        }

        function switchBot(bot) {
            currentBot = bot;
            const buttons = document.querySelectorAll('#botToggle button');
            buttons.forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            render();
        }

        function render() {
            const metrics = allData.metrics[currentBot] || { total_requests: 0, avg_latency: 0 };
            document.getElementById('mTotal').innerText = metrics.total_requests || 0;
            document.getElementById('mLatency').innerText = Math.round(metrics.avg_latency || 0) + 'ms';

            const container = document.getElementById('logContainer');
            container.innerHTML = '';

            const filteredLogs = allData.logs.filter(l => l.bot === currentBot);
            
            if (filteredLogs.length === 0) {
                container.innerHTML = '<div class="log-entry"><span class="log-msg" style="color:#999">No metrics recorded for this session yet.</span></div>';
                return;
            }

            filteredLogs.forEach(log => {
                const div = document.createElement('div');
                div.className = 'log-entry';
                const time = new Date(log.timestamp).toLocaleTimeString([], { hour12: false });
                
                div.innerHTML = `
                    <span class="log-time">${time}</span>
                    <span class="log-msg">${log.message}</span>
                `;
                container.appendChild(div);
            });
        }

        setInterval(fetchData, 4000);
        fetchData();
    </script>
</body>
</html>
